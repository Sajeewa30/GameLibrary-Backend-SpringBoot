spring.application.name=gamelibrarybackend

# MySQL datasource (override via env vars in Railway)
# Supports either SPRING_DATASOURCE_URL or MYSQL_URL provided by Railway.
spring.datasource.url=${SPRING_DATASOURCE_URL:${MYSQL_URL:jdbc:mysql://localhost:3306/gamelibrary?useSSL=false&serverTimezone=UTC}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQLUSER:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD:password}}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Connection pool tuning for low-memory free-tier container.
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:3}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:1}
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.leak-detection-threshold=0

# Path to Firebase Admin service account JSON. Defaults to file in project root; can override with FIREBASE_CREDENTIALS_FILE env var or GOOGLE_APPLICATION_CREDENTIALS.
firebase.admin.credentials.file=${FIREBASE_CREDENTIALS_FILE:firebase-service-account.json}

# Firebase Storage bucket name. If omitted, uses default bucket from Firebase project.
firebase.storage.bucket=${FIREBASE_STORAGE_BUCKET:}

# AWS S3 configuration (optional; if set, uploadImage will prefer S3)
storage.s3.bucket=${STORAGE_S3_BUCKET:}
storage.s3.region=${STORAGE_S3_REGION:us-east-1}
storage.s3.access-key=${STORAGE_S3_ACCESS_KEY:}
storage.s3.secret-key=${STORAGE_S3_SECRET_KEY:}
storage.s3.endpoint=${STORAGE_S3_ENDPOINT:}
storage.s3.public-base-url=${STORAGE_S3_PUBLIC_BASE_URL:}

# Upload limits — kept low to avoid OOM on small containers.
spring.servlet.multipart.max-file-size=${MAX_UPLOAD_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_UPLOAD_REQUEST_SIZE:15MB}
spring.servlet.multipart.file-size-threshold=1MB

# Cache configuration
spring.cache.type=caffeine
spring.cache.caffeine.spec=expireAfterWrite=120s,maximumSize=500

# Tomcat: fewer worker threads = less per-thread stack memory.
server.tomcat.threads.max=${TOMCAT_THREADS_MAX:20}
server.tomcat.threads.min-spare=${TOMCAT_THREADS_MIN:2}
server.tomcat.accept-count=50
server.tomcat.max-connections=200

# Lazy bean init shortens cold-start and reduces idle memory.
spring.main.lazy-initialization=${LAZY_INIT:true}

# Logging — quieter in prod saves CPU and disk I/O.
logging.level.root=${LOG_LEVEL_ROOT:WARN}
logging.level.com.backend=${LOG_LEVEL_APP:INFO}
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

# OpenAI configuration
openai.api-key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-5.2}

# Additional CORS origins (comma-separated). Set FRONTEND_ORIGIN on Railway.
cors.allowed-origins=${FRONTEND_ORIGIN:${CORS_ALLOWED_ORIGINS:}}
